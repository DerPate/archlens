name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.release.outputs.release_created }}

      - name: Set up Java 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        if: ${{ steps.release.outputs.release_created }}
        with:
          java-version: '25'
          distribution: temurin

      - name: Build release artifacts
        if: ${{ steps.release.outputs.release_created }}
        run: mvn -B -q package -DskipTests

      - name: Rename release artifacts
        if: ${{ steps.release.outputs.release_created }}
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          cp target/archlens.jar "target/archlens-${version}.jar"
          cp target/archlens-sources.jar "target/archlens-${version}-sources.jar"
          cp target/archlens-javadoc.jar "target/archlens-${version}-javadoc.jar"

      - name: Upload release artifacts
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            "target/archlens-${version}.jar" \
            "target/archlens-${version}-sources.jar" \
            "target/archlens-${version}-javadoc.jar"
