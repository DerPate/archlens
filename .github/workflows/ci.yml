name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: '25'
          distribution: temurin

      - name: Build and test
        run: mvn verify -B -q -Ddependency-check.skip=true

      - name: Compute OWASP cache week
        if: github.event_name == 'push'
        id: cache-week
        run: echo "value=$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"

      - name: Restore OWASP dependency-check data
        if: github.event_name == 'push'
        id: owasp-cache
        uses: actions/cache/restore@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ~/.cache/dependency-check
          key: ${{ runner.os }}-dependency-check-${{ steps.cache-week.outputs.value }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-

      - name: OWASP dependency check
        if: github.event_name == 'push'
        id: dependency-check
        run: >-
          mvn dependency-check:check -B -q
          -DdataDirectory=$HOME/.cache/dependency-check
          -DnvdValidForHours=24
          -DnvdApiKeyEnvironmentVariable=NVD_API_KEY
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        continue-on-error: true

      - name: Save OWASP dependency-check data
        if: >-
          github.ref == 'refs/heads/main' &&
          steps.owasp-cache.outputs.cache-hit != 'true' &&
          steps.dependency-check.outcome == 'success'
        uses: actions/cache/save@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ~/.cache/dependency-check
          key: ${{ runner.os }}-dependency-check-${{ steps.cache-week.outputs.value }}
