name: Dependency Review

on:
  pull_request:
    branches: [main]

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@ce28f5bb42b7a9f2c824e633a3f6ee835bab6858 # v4.7.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
