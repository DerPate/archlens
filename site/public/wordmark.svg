<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <!-- ===== Icon ===== -->
  <g>
    <!-- Outer limb -->
    <circle cx="100" cy="100" r="88" fill="none" stroke="#F2F2EF" stroke-width="9"/>

    <!-- Inner ring (tropic) -->
    <circle cx="100" cy="100" r="64" fill="none" stroke="#F2F2EF" stroke-width="2.5"/>

    <!-- Graduated limb: minor degree ticks -->
    <g stroke="#F2F2EF" stroke-width="2" stroke-linecap="round" opacity="0.45">
      <line x1="144" y1="23.7" x2="140" y2="30.7"/>
      <line x1="176.2" y1="56" x2="169.3" y2="60"/>
      <line x1="176.2" y1="144" x2="169.3" y2="140"/>
      <line x1="144" y1="176.2" x2="140" y2="169.3"/>
      <line x1="56" y1="176.2" x2="60" y2="169.3"/>
      <line x1="23.8" y1="144" x2="30.7" y2="140"/>
      <line x1="23.8" y1="56" x2="30.7" y2="60"/>
      <line x1="56" y1="23.8" x2="60" y2="30.7"/>
    </g>

    <!-- Cardinal ticks -->
    <g stroke="#F2F2EF" stroke-width="6" stroke-linecap="round">
      <line x1="100" y1="12" x2="100" y2="30"/>
      <line x1="100" y1="188" x2="100" y2="170"/>
      <line x1="12" y1="100" x2="30" y2="100"/>
      <line x1="188" y1="100" x2="170" y2="100"/>
    </g>

    <!-- Faint central crescent -->
    <path d="M70,54 A14,14 0 0,1 70,82 A22,22 0 0,0 70,54 Z" fill="#F2F2EF" opacity="0.28"/>

    <!-- Alidade (tapered pointer, long sighting arm + short tail) -->
    <path d="M144,56 L106,106 L73,127 L94,94 Z" fill="#F4A261"/>

    <!-- Pivot -->
    <circle cx="100" cy="100" r="11" fill="#F2F2EF"/>
    <circle cx="100" cy="100" r="4" fill="#0D1B2A"/>
  </g>

  <!-- ===== Wordmark ===== -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" fill="#F2F2EF">
    <text x="230" y="118" font-size="56" font-weight="700" letter-spacing="1.5">ARCHLENS</text>
    <rect x="231" y="132" width="56" height="3" fill="#F4A261"/>
  </g>
</svg>
