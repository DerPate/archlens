<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer limb -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#0D1B2A" stroke-width="9"/>

  <!-- Inner ring (tropic) -->
  <circle cx="100" cy="100" r="64" fill="none" stroke="#0D1B2A" stroke-width="2.5"/>

  <!-- Cardinal ticks -->
  <g stroke="#0D1B2A" stroke-width="6" stroke-linecap="round">
    <line x1="100" y1="12" x2="100" y2="30"/>
    <line x1="100" y1="188" x2="100" y2="170"/>
    <line x1="12" y1="100" x2="30" y2="100"/>
    <line x1="188" y1="100" x2="170" y2="100"/>
  </g>

  <!-- Alidade (tapered pointer, long sighting arm + short tail) -->
  <path d="M144,56 L106,106 L73,127 L94,94 Z" fill="#F4A261"/>

  <!-- Pivot -->
  <circle cx="100" cy="100" r="11" fill="#0D1B2A"/>
  <circle cx="100" cy="100" r="4" fill="#FFFFFF"/>
</svg>
