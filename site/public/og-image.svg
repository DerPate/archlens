<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Subtle grid -->
  <g stroke="#06B6D4" stroke-width="1" opacity="0.07">
    <line x1="0" y1="48" x2="1200" y2="48"/>
    <line x1="0" y1="96" x2="1200" y2="96"/>
    <line x1="0" y1="144" x2="1200" y2="144"/>
    <line x1="0" y1="192" x2="1200" y2="192"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="288" x2="1200" y2="288"/>
    <line x1="0" y1="336" x2="1200" y2="336"/>
    <line x1="0" y1="384" x2="1200" y2="384"/>
    <line x1="0" y1="432" x2="1200" y2="432"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="528" x2="1200" y2="528"/>
    <line x1="0" y1="576" x2="1200" y2="576"/>
    <line x1="48" y1="0" x2="48" y2="630"/>
    <line x1="96" y1="0" x2="96" y2="630"/>
    <line x1="144" y1="0" x2="144" y2="630"/>
    <line x1="192" y1="0" x2="192" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="288" y1="0" x2="288" y2="630"/>
    <line x1="336" y1="0" x2="336" y2="630"/>
    <line x1="384" y1="0" x2="384" y2="630"/>
    <line x1="432" y1="0" x2="432" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="528" y1="0" x2="528" y2="630"/>
    <line x1="576" y1="0" x2="576" y2="630"/>
    <line x1="624" y1="0" x2="624" y2="630"/>
    <line x1="672" y1="0" x2="672" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="768" y1="0" x2="768" y2="630"/>
    <line x1="816" y1="0" x2="816" y2="630"/>
    <line x1="864" y1="0" x2="864" y2="630"/>
    <line x1="912" y1="0" x2="912" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1008" y1="0" x2="1008" y2="630"/>
    <line x1="1056" y1="0" x2="1056" y2="630"/>
    <line x1="1104" y1="0" x2="1104" y2="630"/>
    <line x1="1152" y1="0" x2="1152" y2="630"/>
  </g>

  <!-- Glow blobs -->
  <defs>
    <radialGradient id="g1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="75%" cy="20%" r="35%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="80%" r="30%">
      <stop offset="0%" stop-color="#F4A261" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F4A261" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <rect width="1200" height="630" fill="url(#g3)"/>

  <!-- Logo mark: 80px diameter, top-center, y=140 -->
  <!-- Original viewBox is 200×200, scale to 80px = scale(0.4), center at x=600 means translate(560, 140) -->
  <g transform="translate(560, 140) scale(0.4)">
    <circle cx="100" cy="100" r="88" fill="none" stroke="#F2F2EF" stroke-width="9"/>
    <circle cx="100" cy="100" r="64" fill="none" stroke="#F2F2EF" stroke-width="2.5"/>
    <g stroke="#F2F2EF" stroke-width="2" stroke-linecap="round" opacity="0.45">
      <line x1="144" y1="23.7" x2="140" y2="30.7"/>
      <line x1="176.2" y1="56" x2="169.3" y2="60"/>
      <line x1="176.2" y1="144" x2="169.3" y2="140"/>
      <line x1="144" y1="176.2" x2="140" y2="169.3"/>
      <line x1="56" y1="176.2" x2="60" y2="169.3"/>
      <line x1="23.8" y1="144" x2="30.7" y2="140"/>
      <line x1="23.8" y1="56" x2="30.7" y2="60"/>
      <line x1="56" y1="23.8" x2="60" y2="30.7"/>
    </g>
    <g stroke="#F2F2EF" stroke-width="6" stroke-linecap="round">
      <line x1="100" y1="12" x2="100" y2="30"/>
      <line x1="100" y1="188" x2="100" y2="170"/>
      <line x1="12" y1="100" x2="30" y2="100"/>
      <line x1="188" y1="100" x2="170" y2="100"/>
    </g>
    <path d="M70,54 A14,14 0 0,1 70,82 A22,22 0 0,0 70,54 Z" fill="#F2F2EF" opacity="0.28"/>
    <path d="M144,56 L106,106 L73,127 L94,94 Z" fill="#F4A261"/>
    <circle cx="100" cy="100" r="11" fill="#F2F2EF"/>
    <circle cx="100" cy="100" r="4" fill="#0D1B2A"/>
  </g>

  <!-- Wordmark: centered at x=600, below logo (logo bottom = 140+80=220, gap 24) -->
  <text
    x="600" y="316"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="88"
    font-weight="700"
    letter-spacing="6"
    fill="#F2F2EF"
    text-anchor="middle"
  >ARCHLENS</text>

  <!-- Orange accent underline: 80px wide, centered -->
  <rect x="560" y="330" width="80" height="3" fill="#F4A261"/>

  <!-- Tagline -->
  <text
    x="600" y="390"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="400"
    letter-spacing="1"
    fill="#94A3B8"
    text-anchor="middle"
  >MCP architecture analysis for real Java systems</text>

  <!-- Domain -->
  <text
    x="600" y="560"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="18"
    font-weight="400"
    letter-spacing="2"
    fill="#334155"
    text-anchor="middle"
  >archlens.dominikbreu.dev</text>
</svg>
