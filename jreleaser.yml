project:
  name: archlens
  description: Stdio MCP server for Java architecture analysis with Spoon.
  longDescription: Stdio Model Context Protocol server that indexes Java workspaces, extracts architecture metadata, and renders Mermaid diagrams.
  authors:
    - Dominik Breu
  inceptionYear: "2026"
  license: MIT
  links:
    homepage: "https://github.com/DerPate/archlens"
    vcsBrowser: "https://github.com/DerPate/archlens"
  languages:
    java:
      groupId: dev.dominikbreu.archlens
      artifactId: archlens
      version: 25
      mainClass: dev.dominikbreu.archlens.Main

release:
  github:
    enabled: true
    owner: DerPate
    name: archlens
    branch: main
    # Releases are triggered by canonical tags such as
    # archlens-1.0.2. JReleaser publishes against that existing
    # tag rather than creating a duplicate "v{{projectVersion}}" tag,
    # which keeps previous-release lookup and changelog generation aligned.
    tagName: archlens-{{projectVersion}}
    previousTagName: archlens-{{previousVersion}}
    skipTag: true
    changelog:
      enabled: true
      formatted: ALWAYS
      preset: conventional-commits
      skipMergeCommits: true
      format: "- {{conventionalCommitDescription}}"
      categoryTitleFormat: "### {{categoryTitle}}"
      hide:
        uncategorized: true
        categories:
          - merge
          - changes
          - test
          - tasks
          - build
          - docs
        contributors:
          - "Copilot"
          - "\\[bot\\]"
      categories:
        - title: "Features"
          key: features
          labels:
            - feat
            - feature
            - enhancement
          order: 1
        - title: "Fixes"
          key: fixes
          labels:
            - fix
            - bug
          order: 2
        - title: "Documentation"
          key: documentation
          labels:
            - docs
          order: 3
        - title: "Maintenance"
          key: maintenance
          labels:
            - build
            - chore
            - perf
            - refactor
            - style
            - test
          order: 4
      labelers:
        - label: feat
          title: "feat:"
        - label: fix
          title: "fix:"
        - label: docs
          title: "docs:"
        - label: build
          title: "build:"
        - label: chore
          title: "chore:"
        - label: refactor
          title: "refactor:"
        - label: test
          title: "test:"
        - label: perf
          title: "perf:"
        - label: style
          title: "style:"
      append:
        enabled: true
        target: CHANGELOG.md
  generic:
    enabled: false
    changelog:
      enabled: false

distributions:
  archlens:
    type: SINGLE_JAR
    stereotype: CLI
    artifacts:
      - path: target/archlens.jar
        transform: archlens/archlens-{{projectEffectiveVersion}}.jar

files:
  artifacts:
    - path: target/archlens-sources.jar
      transform: archlens-{{projectEffectiveVersion}}-sources.jar
    - path: target/archlens-javadoc.jar
      transform: archlens-{{projectEffectiveVersion}}-javadoc.jar
