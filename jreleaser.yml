project:
  name: spoon-mcp-server
  description: Stdio MCP server for Java architecture analysis with Spoon.
  longDescription: Stdio Model Context Protocol server that indexes Java workspaces, extracts architecture metadata, and renders Mermaid diagrams.
  authors:
    - Dominik Breu
  inceptionYear: "2026"
  license: MIT
  links:
    homepage: "https://github.com/DerPate/spoon-mcp-server"
    vcsBrowser: "https://github.com/DerPate/spoon-mcp-server"
  languages:
    java:
      groupId: dev.dominikbreu.spoonmcp
      artifactId: spoon-mcp-server
      version: 25
      mainClass: dev.dominikbreu.spoonmcp.Main

release:
  github:
    enabled: true
    owner: DerPate
    name: spoon-mcp-server
    branch: main
    # Releases are triggered by canonical tags such as
    # spoon-mcp-server-1.0.2. JReleaser publishes against that existing
    # tag rather than creating a duplicate "v{{projectVersion}}" tag,
    # which keeps previous-release lookup and changelog generation aligned.
    tagName: spoon-mcp-server-{{projectVersion}}
    previousTagName: spoon-mcp-server-{{previousVersion}}
    skipTag: true
    changelog:
      enabled: true
      formatted: ALWAYS
      preset: conventional-commits
      skipMergeCommits: true
      format: "- {{conventionalCommitDescription}}"
      categoryTitleFormat: "### {{categoryTitle}}"
      hide:
        uncategorized: true
        categories:
          - merge
          - changes
          - test
          - tasks
          - build
          - docs
        contributors:
          - "Copilot"
          - "\\[bot\\]"
      categories:
        - title: "Features"
          key: features
          labels:
            - feat
            - feature
            - enhancement
          order: 1
        - title: "Fixes"
          key: fixes
          labels:
            - fix
            - bug
          order: 2
        - title: "Documentation"
          key: documentation
          labels:
            - docs
          order: 3
        - title: "Maintenance"
          key: maintenance
          labels:
            - build
            - chore
            - perf
            - refactor
            - style
            - test
          order: 4
      labelers:
        - label: feat
          title: "feat:"
        - label: fix
          title: "fix:"
        - label: docs
          title: "docs:"
        - label: build
          title: "build:"
        - label: chore
          title: "chore:"
        - label: refactor
          title: "refactor:"
        - label: test
          title: "test:"
        - label: perf
          title: "perf:"
        - label: style
          title: "style:"
      append:
        enabled: true
        target: CHANGELOG.md
  generic:
    enabled: false
    changelog:
      enabled: false

distributions:
  spoon-mcp-server:
    type: SINGLE_JAR
    stereotype: CLI
    artifacts:
      - path: target/spoon-mcp-server.jar
        transform: spoon-mcp-server/spoon-mcp-server-{{projectEffectiveVersion}}.jar

files:
  artifacts:
    - path: target/spoon-mcp-server-sources.jar
      transform: spoon-mcp-server-{{projectEffectiveVersion}}-sources.jar
    - path: target/spoon-mcp-server-javadoc.jar
      transform: spoon-mcp-server-{{projectEffectiveVersion}}-javadoc.jar
